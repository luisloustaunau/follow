AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ANMA Supervisión de Obras — Backend

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 512
    Environment:
      Variables:
        TABLE_NAME: !Ref MainTable
        BUCKET_NAME: !Sub 'anma-photos-${AWS::AccountId}'
        JWT_SECRET: !Ref JwtSecret
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'

Parameters:
  JwtSecret:
    Type: String
    Default: 'change-me-in-production'
    NoEcho: true

Resources:
  # ── DynamoDB ────────────────────────────────────────────────
  MainTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: anma-follow
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # ── Photo + PDF bucket ──────────────────────────────────────
  PhotosBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'anma-photos-${AWS::AccountId}'
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST, HEAD]
            AllowedOrigins: ['*']
            ExposedHeaders: [ETag]

  # ── Lambda functions ────────────────────────────────────────
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/handlers/auth.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MainTable
      Events:
        Login:
          Type: Api
          Properties:
            Path: /auth/{proxy+}
            Method: ANY

  ProjectsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/handlers/projects.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MainTable
      Events:
        Projects:
          Type: Api
          Properties:
            Path: /projects
            Method: ANY
        ProjectById:
          Type: Api
          Properties:
            Path: /projects/{projectId}
            Method: ANY

  FrontsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/handlers/fronts.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MainTable
      Events:
        Fronts:
          Type: Api
          Properties:
            Path: /projects/{projectId}/fronts
            Method: ANY
        FrontById:
          Type: Api
          Properties:
            Path: /projects/{projectId}/fronts/{frontId}
            Method: ANY

  ReportsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/handlers/reports.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MainTable
      Events:
        Reports:
          Type: Api
          Properties:
            Path: /fronts/{frontId}/reports
            Method: ANY
        ReportById:
          Type: Api
          Properties:
            Path: /fronts/{frontId}/reports/{reportId}
            Method: ANY

  EstimationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/handlers/estimations.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MainTable
      Events:
        Estimations:
          Type: Api
          Properties:
            Path: /projects/{projectId}/estimations
            Method: ANY
        EstimationById:
          Type: Api
          Properties:
            Path: /projects/{projectId}/estimations/{estId}
            Method: ANY
        EstimationProgram:
          Type: Api
          Properties:
            Path: /projects/{projectId}/estimation-program
            Method: ANY

  ScheduleFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/handlers/schedule.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MainTable
      Events:
        FrontSchedule:
          Type: Api
          Properties:
            Path: /fronts/{frontId}/schedule
            Method: ANY
        FrontScheduleScoped:
          Type: Api
          Properties:
            Path: /projects/{projectId}/fronts/{frontId}/schedule
            Method: ANY

  UploadsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/handlers/uploads.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Sub 'anma-photos-${AWS::AccountId}'
      Events:
        UploadUrl:
          Type: Api
          Properties:
            Path: /fronts/{frontId}/upload-url
            Method: ANY
        ViewUrl:
          Type: Api
          Properties:
            Path: /uploads/view
            Method: ANY

  PdfFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/handlers/pdf.handler
      Timeout: 30
      MemorySize: 1024
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MainTable
        - S3CrudPolicy:
            BucketName: !Sub 'anma-photos-${AWS::AccountId}'
      Events:
        ReportPdf:
          Type: Api
          Properties:
            Path: /fronts/{frontId}/reports/{reportId}/pdf
            Method: ANY
        EstimationsPdf:
          Type: Api
          Properties:
            Path: /projects/{projectId}/estimations/pdf
            Method: ANY

Outputs:
  ApiUrl:
    Description: API Gateway endpoint
    Value: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod'
  TableName:
    Value: !Ref MainTable
  BucketName:
    Value: !Ref PhotosBucket
